<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;400;500;600;700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load src="./partials/header.html" highlight-reservation="active" />

    <main class="reservation-page">
      <div class="container reservation-page-container">
        <div class="content-page-back reservation-page-back">
          <load src="./partials/back-link.html" />
        </div>
        <div id="meta_container" class="reservation-card">
          <div class="reservation-card-header">
            <p class="reservation-eyebrow">Reservations</p>
            <h1 class="home-titel_h1">Book a table</h1>
            <p class="home_text">
              Choose your preferred date and leave your details. We will confirm
              your booking shortly.
            </p>
          </div>

          <form id="reservation_form" class="reservation-form">
            <fieldset class="reservation-fieldset">
              <legend class="home-titel_h3">Booking info</legend>

              <div id="booking_info" class="reservation-grid reservation-grid-3">
                <div class="input_group">
                  <label for="people">Guests</label>
                  <input
                    id="people"
                    type="number"
                    min="1"
                    max="12"
                    placeholder="2"
                  />
                </div>

                <div class="input_group">
                  <label for="date">Date</label>
                  <input id="date" type="date" />
                </div>

                <div class="input_group">
                  <label for="time">Time</label>
                  <input id="time" type="time" />
                </div>
              </div>
            </fieldset>

            <fieldset class="reservation-fieldset">
              <legend class="home-titel_h3">Personal info</legend>

              <div id="personal_info" class="reservation-grid">
                <div class="input_group input_group-wide">
                  <label for="fullname">Full name</label>
                  <input
                    id="fullname"
                    type="text"
                    placeholder="Your name"
                    autocomplete="name"
                  />
                </div>

                <div class="input_group">
                  <label for="email">Email</label>
                  <input
                    id="email"
                    type="email"
                    placeholder="name@example.com"
                    autocomplete="email"
                  />
                </div>

                <div class="input_group">
                  <label for="phone">Phone number</label>
                  <input
                    id="phone"
                    type="tel"
                    placeholder="+44 1234 567890"
                    autocomplete="tel"
                  />
                </div>
              </div>
            </fieldset>

            <div class="reservation-actions">
              <button class="button" type="submit">Book now</button>
              <p id="error_message" aria-live="polite"></p>
            </div>
          </form>
        </div>
      </div>

      <div
        class="reservation-modal"
        id="reservation_success_modal"
        aria-hidden="true"
        role="dialog"
        aria-modal="true"
        aria-labelledby="reservation_success_title"
      >
        <div class="reservation-modal-content">
          <p class="reservation-eyebrow">Reservation</p>
          <h2 class="home-titel_h2" id="reservation_success_title">
            Reservation successful
          </h2>
          <p class="home_text">
            We will contact you through your email and mobile phone to confirm.
          </p>
        </div>
      </div>
    </main>

    <load src="./partials/footer.html" />
    <script type="module" src="./main.js"></script>
  </body>
</html>
